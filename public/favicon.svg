<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Lantern Harbor">
  <rect width="64" height="64" rx="11" fill="#0F2A3F"/>
  <!-- simplified hurricane lantern: flat gold silhouette, dark glass, glowing flame -->
  <g fill="#E5C067">
    <path d="M29.5 10.5h5l-.6 3.2h-3.8z"/>             <!-- top knob -->
    <path d="M25 14.2h14l-2.7 6H27.7z"/>               <!-- vented cap -->
    <rect x="27.4" y="20.2" width="9.2" height="3.6"/> <!-- collar -->
    <path d="M27 24C18.8 28.6 18.8 43 27 47.4h10C45.2 43 45.2 28.6 37 24z"/> <!-- body -->
    <path d="M25.8 47.2h12.4l3 5H22.8z"/>              <!-- base flare -->
    <rect x="24.2" y="51.8" width="15.6" height="3.7" rx="1"/> <!-- foot -->
  </g>
  <path d="M29 27.4C23.4 30.8 23.4 40.8 29 44.2h6C40.6 40.8 40.6 30.8 35 27.4z" fill="#0F2A3F"/> <!-- glass -->
